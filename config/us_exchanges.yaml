# US-Compliant Cryptocurrency Exchanges Configuration
# Updated for 2025 regulations and availability

exchanges:
  coinbase_pro:
    name: "Coinbase Advanced"
    status: "active"
    us_compliant: true
    api_url: "https://api.exchange.coinbase.com"
    websocket_url: "wss://ws-feed.exchange.coinbase.com"
    features:
      - spot_trading
      - margin_trading
      - futures_trading
      - api_trading
    supported_pairs:
      - BTC/USD
      - ETH/USD
      - ADA/USD
      - SOL/USD
      - MATIC/USD
      - AVAX/USD
      - DOT/USD
      - LINK/USD
    fees:
      maker: 0.005  # 0.5%
      taker: 0.005  # 0.5%
    limits:
      min_order: 1.0  # $1 minimum
      max_order: 1000000  # $1M maximum
    
  kraken:
    name: "Kraken"
    status: "active"
    us_compliant: true
    api_url: "https://api.kraken.com"
    websocket_url: "wss://ws.kraken.com"
    features:
      - spot_trading
      - margin_trading
      - futures_trading
      - api_trading
    supported_pairs:
      - XBTUSD  # BTC/USD
      - ETHUSD  # ETH/USD
      - ADAUSD  # ADA/USD
      - SOLUSD  # SOL/USD
      - MATICUSD # MATIC/USD
    fees:
      maker: 0.0016  # 0.16%
      taker: 0.0026  # 0.26%
    limits:
      min_order: 5.0  # $5 minimum
      max_order: 100000  # $100K maximum

  gemini:
    name: "Gemini"
    status: "active"
    us_compliant: true
    api_url: "https://api.gemini.com"
    websocket_url: "wss://api.gemini.com"
    features:
      - spot_trading
      - api_trading
    supported_pairs:
      - BTCUSD
      - ETHUSD
      - ADAUSD
      - SOLUSD
      - LINKUSD
    fees:
      maker: 0.0025  # 0.25%
      taker: 0.0035  # 0.35%
    limits:
      min_order: 1.0
      max_order: 500000

# Primary exchange for live trading
primary_exchange: "coinbase_pro"

# Backup exchanges
backup_exchanges:
  - "kraken"
  - "gemini"

# Risk management settings
risk_settings:
  max_position_size: 0.10  # 10% of portfolio
  max_daily_trades: 50
  max_slippage: 0.005  # 0.5%
  emergency_stop_loss: 0.05  # 5%
